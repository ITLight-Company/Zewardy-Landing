<router-outlet></router-outlet>

<!-- Cookie Consent Banner -->
<div class="cookie-banner" *ngIf="!cookiesAccepted">
  <div class="cookie-banner__inner">
    <div class="cookie-banner__content">
      <strong>{{ 'COOKIES.TITLE' | translate }}</strong>
      <p>
        {{ 'COOKIES.TEXT' | translate }}
        <br />
        <a [routerLink]="'/privacy-policy'">{{ 'NAVBAR.PRIVACY_POLICY' | translate }}</a>.
      </p>
    </div>
    <div class="cookie-banner__actions">
      <button class="cookie-banner__btn cookie-banner__btn--accept" (click)="acceptCookies()">{{ 'COOKIES.BTN_ACCEPT' | translate }}</button>
    </div>
  </div>
</div>
