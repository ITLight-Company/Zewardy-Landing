name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm i

      - name: Build 🏗️
        run: npm run build

      - name: Copy CNAME 📋
        run: |
          if [ -f "docs/CNAME" ]; then
            cp docs/CNAME dist/zewardy-landing/browser/CNAME
          fi

      - name: Copy index.html to 404.html 📋
        run: cp dist/zewardy-landing/browser/index.html dist/zewardy-landing/browser/404.html

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/zewardy-landing/browser
          publish_branch: gh-pages
          force_orphan: true
